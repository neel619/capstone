<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - HealthConnect</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .signin-container {
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.1) 0%, rgba(37, 99, 235, 0.05) 100%);
    }
    
    .form-container {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
    }
    
    .animated-bg {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: -1;
      overflow: hidden;
    }
    
    .blob {
      position: absolute;
      background: rgba(37, 99, 235, 0.1);
      border-radius: 50%;
      filter: blur(40px);
    }
    
    .blob-1 {
      width: 400px;
      height: 400px;
      top: -100px;
      right: -100px;
      animation: float 8s infinite;
    }
    
    .blob-2 {
      width: 300px;
      height: 300px;
      bottom: -50px;
      left: -50px;
      animation: float 10s infinite reverse;
    }
    
    @keyframes float {
      0% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(30px, -50px) rotate(120deg); }
      66% { transform: translate(-20px, 20px) rotate(240deg); }
      100% { transform: translate(0, 0) rotate(360deg); }
    }
    
    .input-field {
      transition: all 0.3s ease;
    }
    
    .input-field:focus {
      transform: translateY(-2px);
    }
    
    .signin-button {
      transition: all 0.3s ease;
    }
    
    .signin-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
    }

    .error-message {
      display: none;
      color: #dc2626;
      font-size: 0.875rem;
      margin-top: 0.5rem;
    }

    .error-message.show {
      display: block;
      animation: shake 0.5s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
  </style>
</head>
<body class="min-h-screen bg-gray-50">
  <!-- Navigation -->
  <nav class="bg-white shadow-sm fixed w-full z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
      <div class="flex justify-between items-center">
        <a href="index.html" class="flex items-center">
          <i data-lucide="activity" class="h-8 w-8 text-blue-600"></i>
          <span class="ml-2 text-xl font-bold text-gray-900">HealthConnect</span>
        </a>
        <a href="start.html" class="text-gray-600 hover:text-blue-600">
          Get Started
        </a>
      </div>
    </div>
  </nav>

  <main class="min-h-screen flex items-center justify-center pt-16 signin-container">
    <div class="animated-bg">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
    </div>
    
    <div class="w-full max-w-md px-6 py-8">
      <div class="form-container rounded-2xl shadow-xl p-8">
        <div class="text-center mb-8">
          <h1 class="text-3xl font-bold text-gray-900 mb-2">Welcome Back</h1>
          <p class="text-gray-600">Sign in to continue your health journey</p>
        </div>

        <form id="signin-form" class="space-y-6">
          <div>
            <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
              Email Address
            </label>
            <input 
              type="email" 
              id="email" 
              class="input-field w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-600 focus:border-blue-600"
              placeholder="Enter your email"
              required
            >
            <div id="email-error" class="error-message"></div>
          </div>

          <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
              Password
            </label>
            <input 
              type="password" 
              id="password" 
              class="input-field w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-600 focus:border-blue-600"
              placeholder="Enter your password"
              required
            >
            <div id="password-error" class="error-message"></div>
          </div>

          <div class="flex items-center justify-between">
            <div class="flex items-center">
              <input 
                type="checkbox" 
                id="remember" 
                class="h-4 w-4 text-blue-600 border-gray-300 rounded focus:ring-blue-600"
              >
              <label for="remember" class="ml-2 text-sm text-gray-600">
                Remember me
              </label>
            </div>
            <a href="#" class="text-sm text-blue-600 hover:text-blue-800">
              Forgot password?
            </a>
          </div>

          <div id="form-error" class="error-message text-center"></div>

          <button 
            type="submit" 
            class="signin-button w-full bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-700 transition-colors"
          >
            Sign In
          </button>

          <div class="relative my-6">
            <div class="absolute inset-0 flex items-center">
              <div class="w-full border-t border-gray-300"></div>
            </div>
            <div class="relative flex justify-center text-sm">
              <span class="px-2 bg-white text-gray-500">Or continue with</span>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <button 
              type="button" 
              class="flex items-center justify-center px-4 py-3 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors"
              onclick="handleSocialSignIn('google')"
            >
              <img src="https://www.google.com/favicon.ico" alt="Google" class="w-5 h-5 mr-2">
              Google
            </button>
            <button 
              type="button" 
              class="flex items-center justify-center px-4 py-3 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors"
              onclick="handleSocialSignIn('apple')"
            >
              <img src="https://www.apple.com/favicon.ico" alt="Apple" class="w-5 h-5 mr-2">
              Apple
            </button>
          </div>

          <p class="text-center text-sm text-gray-600 mt-8">
            Don't have an account?
            <a href="#" class="text-blue-600 hover:text-blue-800 font-medium">
              Sign up now
            </a>
          </p>
        </form>
      </div>
    </div>
  </main>

  <!-- Use a specific version of Lucide to avoid source map errors -->
  <script src="https://unpkg.com/lucide@0.263.0"></script>
  <script>
    // Initialize Lucide icons
    lucide.createIcons();

    // Helper function to show error message
    function showError(elementId, message) {
      const errorElement = document.getElementById(elementId);
      errorElement.textContent = message;
      errorElement.classList.add('show');
      setTimeout(() => {
        errorElement.classList.remove('show');
      }, 3000);
    }

    // Helper function to validate email
    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    // Helper function to validate password
    function isValidPassword(password) {
      return password.length >= 6;
    }

    // Form submission handling
    const form = document.getElementById('signin-form');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;
      
      // Validate email
      if (!isValidEmail(email)) {
        showError('email-error', 'Please enter a valid email address');
        return;
      }

      // Validate password
      if (!isValidPassword(password)) {
        showError('password-error', 'Password must be at least 6 characters long');
        return;
      }
      
      // Show loading state
      const submitButton = form.querySelector('button[type="submit"]');
      const originalText = submitButton.textContent;
      submitButton.disabled = true;
      submitButton.innerHTML = `
        <svg class="animate-spin h-5 w-5 mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
      `;
      
      try {
        // Simulate API call
        await new Promise(resolve => setTimeout(resolve, 2000));
        
        // Store auth state (in a real app, this would be a token)
        localStorage.setItem('isAuthenticated', 'true');
        
        // Redirect to home page
        const redirectUrl = new URL('index.html', window.location.href).href;
        window.location.replace(redirectUrl);
      } catch (error) {
        // Reset button state
        submitButton.disabled = false;
        submitButton.textContent = originalText;
        
        // Show error message
        showError('form-error', 'An error occurred. Please try again.');
      }
    });

    // Social sign in handling
    function handleSocialSignIn(provider) {
      // In a real app, this would integrate with the social provider's SDK
      console.log(`Signing in with ${provider}`);
      
      // Simulate successful sign in
      setTimeout(() => {
        localStorage.setItem('isAuthenticated', 'true');
        const redirectUrl = new URL('index.html', window.location.href).href;
        window.location.replace(redirectUrl);
      }, 1000);
    }

    // Input animations
    const inputs = document.querySelectorAll('.input-field');
    
    inputs.forEach(input => {
      input.addEventListener('focus', () => {
        input.parentElement.classList.add('focused');
      });
      
      input.addEventListener('blur', () => {
        if (!input.value) {
          input.parentElement.classList.remove('focused');
        }
      });
    });

    // Check if user is already authenticated
    document.addEventListener('DOMContentLoaded', () => {
      if (localStorage.getItem('isAuthenticated') === 'true') {
        const redirectUrl = new URL('index.html', window.location.href).href;
        window.location.replace(redirectUrl);
      }
    });
  </script>
</body>
</html>

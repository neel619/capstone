<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HealthConnect</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html">Home</a>
            <a href="services.html">Services</a>
            <a href="contact.html">Contact</a>
            <a href="login.html" class="active">Sign In</a>
        </nav>
    </header>
    <main>
        <div class="login-container">
            <h2>Sign In to HealthConnect</h2>
            <form id="loginForm" action="/login" method="POST">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
                
                <button type="submit">Sign In</button>
            </form>
            <p>Don't have an account? <a href="register.html">Get Started</a></p>
        </div>
    </main>
    <footer>
        <p>&copy; 2025 HealthConnect. All rights reserved.</p>
    </footer>
    <script src="login.js"></script>
</body>
</html>
